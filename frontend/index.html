<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossroad Inventory Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
           font-family: Arial, sans-serif;
           height: 100vh;
           margin: 0;
           display: flex;
           justify-content: center;
           align-items: center;
           position: relative;
           overflow: hidden;
       }
      .logo-text span {
          font-size: 16px; /* adjust smaller if needed */
          text-align: left;
       }
       body::before {
           content: "";
           position: absolute;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           background: url("../image/login_background.jpeg") no-repeat center center/cover;
           filter: blur(0px);
           z-index: -1;
       }
       .login-box{
           background:white;
           padding:30px;
           width:350px;
           border-radius:8px;
           box-shadow:0 4px 10px rgba(0,0,0,0.5);
       }
       .logo-container {
           text-align: center;
           margin-bottom: 20px;
       }
       .logo-text {
           display: flex;
           gap: 10px;
           font-size: 24px;
           font-weight: bold;
           justify-content: center;
           align-items: center;
       }
       .logo {
           width: 25px;
           height: auto;
       }
       label{
           font-size:14px;
       }
       input{
           width:100%;
           padding:10px;
           margin-top:5px;
           margin-bottom:15px;
           border:1px solid #ccc;
           border-radius:5px;
           box-sizing:border-box;
       }
       .password-wrapper{
           position:relative;
           margin-top:5px;
           margin-bottom:15px;
       }
       .password-wrapper input{
           padding-right:40px;
       }
       .toggle-password{
           position:absolute;
           right:10px;
           top:40%;
           transform:translateY(-50%);
           cursor:pointer;
           font-size:16px;
           color:#555;
       }
       button{
           width:100%;
           padding:10px;
           border:none;
           background:#ffc107;
           color:black;
           font-size:16px;
           border-radius:5px;
           cursor:pointer;
           display:flex;
           justify-content:center;
           align-items:center;
           gap:8px;
       }
       button:hover{
           background:#edb100;
       }
       .forgot-link{
           display:block;
           text-align:right;
           margin-top:-10px;
           margin-bottom:15px;
           font-size:14px;
       }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo-container">
        <h3 class="logo-text">
            <img src="../image/logo.png" alt="Crossroad Solutions" class="logo">
            <span>Crossroad Solutions Sdn Bhd</span>
        </h3>
    </div>
    <!-- <h4>Welcome Back</h4> -->
    <form action="../backend/login.php" method="POST">
        <label>Username</label>
        <input type="email" name="email" required>
        <label>Password</label>
        <div class="password-wrapper">
            <input type="password" id="password" name="password" required>
            <i class="fa-solid fa-eye toggle-password" onclick="togglePassword()"></i>
        </div>
        <a href="../backend/forgot_request.php" class="forgot-link">Forgot Password?</a>
        <button type="submit">
            <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>
    </form>
</div>
<script>
    function togglePassword(){
        const password = document.getElementById("password");
        password.type = password.type === "password" ? "text" : "password";
    }
</script>
</body>
</html>
